<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Animaizinhos</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #fdf6ec;
      --card-bg:   #ffffff;
      --title:     #3b2a1a;
      --accent1:   #f4845f;
      --accent2:   #f9bc60;
      --accent3:   #a8d8a8;
      --shadow:    rgba(60, 40, 20, 0.15);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 20%, #fde2c8 0%, transparent 45%),
        radial-gradient(circle at 85% 75%, #d4edda 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, #fdf0d5 0%, transparent 60%);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* Decorative paws in background */
    body::before, body::after {
      content: '🐾';
      position: fixed;
      font-size: 6rem;
      opacity: 0.06;
      pointer-events: none;
      user-select: none;
    }
    body::before { top: 5%;  left: 4%;  transform: rotate(-20deg); }
    body::after  { bottom: 5%; right: 4%; transform: rotate(15deg); }

    /* ── Title ── */
    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 800;
      color: var(--title);
      letter-spacing: -0.5px;
      margin-bottom: 2rem;
      text-align: center;
      position: relative;
      animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    h1 span {
      color: var(--accent1);
    }

    h1::after {
      content: '';
      display: block;
      margin: 0.4rem auto 0;
      width: 60%;
      height: 4px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow:
        0 4px 6px var(--shadow),
        0 12px 40px var(--shadow);
      animation: riseUp 0.7s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
    }

    /* corner badges */
    .card::before, .card::after {
      font-size: 1.4rem;
      position: absolute;
      pointer-events: none;
    }
    .card::before { content: '🌿'; top: -12px; left: 14px; }
    .card::after  { content: '🌸'; bottom: -12px; right: 14px; }

    /* ── Photo ── */
    .photo-wrapper {
      position: relative;
      width: clamp(240px, 70vw, 420px);
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
    }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 20px;
      transition: transform 0.35s ease;
    }

    .photo-wrapper:hover img {
      transform: scale(1.04);
    }

    /* Click ripple */
    .photo-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      border-radius: 20px;
      pointer-events: none;
      transition: background 0.25s ease;
    }
    .photo-wrapper.clicked::after {
      background: rgba(255,255,255,0.35);
    }

    /* Overlay hint */
    .hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 14px;
      border-radius: 99px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .photo-wrapper:hover .hint {
      opacity: 1;
    }

    /* Dot indicators */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 1rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d9cfc4;
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }
    .dot.active {
      background: var(--accent1);
      transform: scale(1.3);
    }

    /* Flip animation */
    @keyframes flipIn {
      0%   { opacity: 0; transform: rotateY(-90deg) scale(0.9); }
      100% { opacity: 1; transform: rotateY(0deg)   scale(1);   }
    }
    .flip {
      animation: flipIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── Cat paw click effect ── */
    .paw {
      position: fixed;
      pointer-events: none;
      user-select: none;
      font-size: 2.4rem;
      transform: translate(-50%, -50%) scale(0) rotate(-20deg);
      animation: pawStamp 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      z-index: 9999;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
    }

    @keyframes pawStamp {
      0%   { transform: translate(-50%, -50%) scale(0)    rotate(-20deg); opacity: 1; }
      40%  { transform: translate(-50%, -50%) scale(1.4)  rotate(-5deg);  opacity: 1; }
      65%  { transform: translate(-50%, -50%) scale(0.95) rotate(-10deg); opacity: 1; }
      80%  { transform: translate(-50%, -50%) scale(1.1)  rotate(-8deg);  opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.05) rotate(-8deg);  opacity: 0; }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7) translateY(-20px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);     }
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
  </style>
</head>
<body>

  <h1>Meus <span>Animaizinhos</span> 🐾</h1>

  <div class="card">
    <div class="photo-wrapper" id="photoWrapper" onclick="nextPhoto()">
      <img id="animalPhoto" src="fotos/f1.jpg" alt="Meu animalzinho" />
      <span class="hint">clique para trocar 🐾</span>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <script>
    // ── Cat paw on click ──
    document.addEventListener('click', (e) => {
      const paw = document.createElement('span');
      paw.className = 'paw';
      paw.textContent = '🐾';
      paw.style.left = e.clientX + 'px';
      paw.style.top  = e.clientY + 'px';
      document.body.appendChild(paw);
      paw.addEventListener('animationend', () => paw.remove());
    });

    const photos = ['fotos/f1.jpg', 'fotos/f2.jpg', 'fotos/f3.jpg'];
    let current = 0;

    const img     = document.getElementById('animalPhoto');
    const wrapper = document.getElementById('photoWrapper');
    const dotsEl  = document.getElementById('dots');

    // Build dots
    photos.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.onclick = (e) => { e.stopPropagation(); goTo(i); };
      dotsEl.appendChild(d);
    });

    function updateDots() {
      document.querySelectorAll('.dot').forEach((d, i) =>
        d.classList.toggle('active', i === current)
      );
    }

    function goTo(index) {
      if (index === current) return;
      current = index;
      changePhoto();
    }

    function nextPhoto() {
      current = (current + 1) % photos.length;
      changePhoto();
    }

    function changePhoto() {
      wrapper.classList.add('clicked');
      setTimeout(() => wrapper.classList.remove('clicked'), 250);

      img.classList.remove('flip');
      void img.offsetWidth;
      img.src = photos[current];
      img.classList.add('flip');

      updateDots();
    }
  </script>
</body>
</html>
